name: Terraform Azure Deployment

on:
  push:
    branches:
      - main
 
permissions:
  contents: read
  id-token: write  

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CLIENT_ID_MONITOR }}
          tenant-id: ${{ secrets.TENANT_ID_MONITOR }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID_MONITOR }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      - name: Cache Terraform providers
        uses: actions/cache@v3
        with:
          path: |
            ~/.terraform.d/plugin-cache
            .terraform/plugins
          key: ${{ runner.os }}-terraform-providers-${{ hashFiles('**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-providers-

      - name: Terraform Init
        run: terraform init --upgrade

      - name: Terraform Validate
        run: terraform validate


      - name: Terraform Plan
        run: terraform plan -lock-timeout=5m -var-file=terraform.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=terraform.tfvars
