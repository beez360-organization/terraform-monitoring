name: Terraform Azure Deployment

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CLIENT_ID_MONITOR }}
          tenant-id: ${{ secrets.TENANT_ID_MONITOR }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID_MONITOR }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      # ---------- BOOTSTRAP BACKEND ----------
      - name: Terraform Bootstrap Init
        working-directory: bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.CLIENT_ID_MONITOR }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID_MONITOR }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID_MONITOR }}
        run: terraform init

      - name: Terraform Bootstrap Apply
        working-directory: bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.CLIENT_ID_MONITOR }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID_MONITOR }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID_MONITOR }}
        run: terraform apply -auto-approve

      # ---------- REAL STACK ----------
      - name: Terraform Init
        env:
          ARM_CLIENT_ID: ${{ secrets.CLIENT_ID_MONITOR }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID_MONITOR }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID_MONITOR }}
        run: terraform init

      - name: Terraform Plan
        env:
          ARM_CLIENT_ID: ${{ secrets.CLIENT_ID_MONITOR }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID_MONITOR }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID_MONITOR }}
        run: terraform plan -var-file=terraform.tfvars

      - name: Terraform Apply
        env:
          ARM_CLIENT_ID: ${{ secrets.CLIENT_ID_MONITOR }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID_MONITOR }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID_MONITOR }}
        run: terraform apply -auto-approve -var-file=terraform.tfvars
