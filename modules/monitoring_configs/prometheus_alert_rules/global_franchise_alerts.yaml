groups:
  - name: beez360_global_alerts
    rules:
      - alert: APIHighLatencyP95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P95 latency > 500ms for 5 minutes"
          description: "P95 latency is above threshold, investigate potential performance issues."

      - alert: APIErrorRate5xx
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.02
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx error rate above 2%"
          description: "High 5xx error rate detected."

      - alert: DiskUsageHigh
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage > 80%"
          description: "Disk space critically low on root partition."

      - alert: WebSocketDrops
        expr: increase(websocket_drops_total[1m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket drops > 10/min"
          description: "Increased websocket connection drops detected."
